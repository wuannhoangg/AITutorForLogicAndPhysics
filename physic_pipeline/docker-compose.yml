services:
  exact_fama_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: exact-fama-api:latest
    container_name: exact_fama_api
    ports:
      - "8000:8000"
    environment:
      LLM_BACKEND: ${LLM_BACKEND:-none}
      MODEL_NAME: ${MODEL_NAME:-models/Qwen3-8B}
      LORA_ADAPTER_PATH: ${LORA_ADAPTER_PATH:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_MAX_NEW_TOKENS: ${LLM_MAX_NEW_TOKENS:-512}
      EXACT_FAMA_CONFIG: ${EXACT_FAMA_CONFIG:-configs/eval_solver_only.yaml}
      EXACT_USE_PROVIDED_FOL: ${EXACT_USE_PROVIDED_FOL:-0}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data:ro
      - ./configs:/app/configs:ro
      # Mount local model only if you run LLM_BACKEND=hf inside Docker.
      # Solver-only Docker does not need this mount.
      - ./models:/app/models:ro
    restart: unless-stopped
