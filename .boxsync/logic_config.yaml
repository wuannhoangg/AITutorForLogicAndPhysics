# ═══════════════════════════════════════════════════════════════════════════
#  Resident LLM line-up for your grading slot  (EXACT 2026)
# ═══════════════════════════════════════════════════════════════════════════
# Every model under `models:` is launched (one vLLM server each; setup.sh/run_server.sh
# download only these; a model that fails to load is skipped and the flow degrades).
#
# Type 1 flow (mode: arbiter — the generate→judge design):
#
#     Question
#        ├─ the two 4B "generator" models answer CONCURRENTLY (non-thinking, direct),
#        │  each emitting {answer, premises_used, explanation}
#        ├─ the two generators are then PUT TO SLEEP and the 8B "judge" is WOKEN,
#        │  also in THINKING mode; it inspects the original premises + question
#        │  plus both juniors' answers (reference only) and decides the truly
#        │  correct answer, re-deriving premises_used + explanation itself
#        ├─ the judge sleeps, the generators wake back up (resting state)
#        ▼
#     deterministic code → the competition result object (Section 4 schema)
#
# Type 2 (physics) uses the FIRST generator for its optional LLM calls.
#
# ── THE LINE-UP (param count the committee counts = TOTAL params) ────────────
#   Qwen/Qwen3.5-4B               4B   (ungated, VLM)             generator (non-thinking)
#   Qwen/Qwen3-4B-Instruct-2507   4B   (ungated, text)            generator (non-thinking)
#   google/gemma-4-E4B-it         8B   (ungated, ~8B total)       judge     (thinking)
#
#   All three are UNGATED — no HF_TOKEN required. Point the judge at any other repo
#   via env JUDGE_MODEL / JUDGE_PARAMS_B (see its entry under `models:`).
#
# ── THE HARD INVARIANT (contest compliance + OOM safety) ─────────────────────
#   At EVERY instant EXACTLY ONE group has weights on the GPU:
#       {both 4B generators}  XOR  {the 8B judge}     — never all three, never a mix.
#   Enforced by SLEEP LEVEL 1 (the slept group's weights are offloaded OFF the GPU to
#   CPU RAM — lossless, FP8-safe). So the params LOADED ON-GPU at any moment are exactly
#   max(4+4, 8) = 8B, satisfying
#   the committee's "≤ 8B loaded at any single moment" rule (Submission Guide §6.3).
#   The committee counts TOTAL params that EXIST (4+4+8 = 16B) → that is what the
#   launch guard checks against `max_resident_b` below; the *momentary* load is 8B.
#
# ── PRECISION + MEMORY (RTX 5090, 32 GiB ≈ 31.8 GiB usable) ───────────────────
#   quantization: 8bit  → online FP8 (~1 byte/param) on this Blackwell card.
#   ENFORCE_EAGER=1 is the run_server.sh DEFAULT for this swap line-up: CUDA-graph
#   capture is disabled so a SLEPT process's GPU residual stays small (~4 GiB, vs
#   ~4.7 GiB with graphs) — three coexisting vLLM processes must each leave room for
#   the awake group. Measured/sized budget (eager ON, level-1 sleep):
#       GEN  phase: 0.36·31.8 + 0.36·31.8 + ~4.1 (judge slept)   ≈ 27 GiB  ✓
#       JUDGE phase: 0.60·31.8 + 2·~4.1 (gens slept)             ≈ 27 GiB  ✓
#   If FP8 ever produces degenerate text on a future model, set env QUANTIZATION=4bit
#   (bitsandbytes NF4) as a fallback — that is the only other precision lever.
# ═══════════════════════════════════════════════════════════════════════════

# Logic flow:
#   arbiter — generators think → the judge rules → code builds the submission
#             object. With no role tags: every model generates and the highest-
#             weight one arbitrates; a single-model line-up makes two passes
#             (strict + skeptical) and self-judges.
#   vote    — the cascade's weighted soft vote (no judge).
mode: arbiter

# Disk swap (env SWAP overrides). When true (default) and the line-up has a
# `judge` role + ≥1 generator, the generators stay co-resident and the 8B judge is
# swapped in (generators discarded to disk) only for its arbitration call — peak
# GPU = the larger group, so the 2×4B + 8B line-up fits a 32 GB card AND only the
# awake group's params are loaded at any moment. The swap uses vLLM sleep level 1
# (RESIDENCY_SLEEP_LEVEL, default 1 = RAM offload, lossless & FP8-safe; level 2 =
# discard+reload-from-disk corrupts FP8 on wake). Set swap: false to hold all models
# resident (would break the ≤8B rule).
swap: true

# Quantization for EVERY model (env QUANTIZATION overrides; a model may override
# with its own `quantization:`). One of:
#   none  — full precision bf16 (~2 B/param).
#   8bit  — online FP8 (~1 B/param). Needs an Ada/Hopper/Blackwell GPU (4090/5070/5090);
#           unsupported on Ampere (A100/3090). ← THIS DEPLOYMENT (RTX 5090).
#   4bit  — bitsandbytes NF4 (~0.5 B/param). Fallback if FP8 misbehaves on a model.
quantization: 8bit

# Thinking mode for the reasoning calls (env THINKING overrides; a model may
# override with its own `thinking:`). true = the model emits a reasoning chain
# before its JSON verdict (better reasoning, slower); false = a direct answer.
# Default true. Helper JSON calls (premises_used, option-pick fallback) are always
# no-think regardless, and run against the AWAKE arbiter so the swap invariant holds.
thinking: true

# The residency budget the launch guard enforces (sum of params_b). The committee's
# momentary limit is 8B; this 16 is the TOTAL-params-that-exist budget for the swap
# line-up (4+4+8), which the launcher checks. Env MAX_RESIDENT_B overrides.
max_resident_b: 16

# ── THE GENERATE→JUDGE LINE-UP ───────────────────────────────────────────────
# Each model accepts an optional `gpu_memory_utilization:` (0–1) pinning that
# server's vLLM --gpu-memory-utilization, and optional per-model `quantization:` /
# `thinking:` overriding the globals. The fractions below are sized so that the two
# co-resident generators (gen phase) and the lone judge (judge phase) each fit the
# 32 GB card alongside the OTHER group's slept-process residual (see budget above).
models:
  - id: Qwen/Qwen3.5-4B
    params_b: 4
    weight: 1.0
    role: generator
    thinking: false                 # direct answers; both generators run non-thinking and the judge does the reasoning
    gpu_memory_utilization: 0.36    # co-resident with the second 4B generator
  - id: Qwen/Qwen3-4B-Instruct-2507  # ungated, non-thinking (direct-answer) model
    params_b: 4
    weight: 1.0
    role: generator
    thinking: false
    gpu_memory_utilization: 0.36    # co-resident with the first 4B generator
  # ── JUDGE (the 8B) ─────────────────────────────────────────────────────────
  # Woken ALONE (both generators slept) for its arbitration call, so it gets the
  # larger slice. Point at any HF repo via env JUDGE_MODEL; JUDGE_PARAMS_B overrides
  # the counted size.
  - id: ${JUDGE_MODEL:-google/gemma-4-E4B-it}
    params_b: ${JUDGE_PARAMS_B:-8}
    weight: 1.5
    role: judge
    thinking: true                  # set false for a faster, direct verdict
    gpu_memory_utilization: 0.60    # alone on the card during arbitration

# ── Strict-8B alternatives (kept for reference) ──────────────────────────────
# Line-up B (single Gemma-4-E4B, two passes + self-judge): one model, role judge.
# Line-up C (Qwen3.5-4B alone): smallest, zero ambiguity, role judge.
